<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Missing Complaint</title>
</head>
<body>

    <h2>
        Add Missing Complaint
    </h2>

    <h3>
        Hazard:
        {{ hazard.title }}
    </h3>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Submit Complaint
        </button>

    </form>

</body>
</html>
